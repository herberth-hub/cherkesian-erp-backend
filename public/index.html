<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cherkesian ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --onyx:#0A0A0A; --onyx2:#100f0d; --sidebar:#131109; --sidebar2:#1b1810;
  --gold:#C9A227; --gold-d:#9a7d1e; --gold-l:#E4C76B;
  --ivory:#F4F2ED; --bg:#f4f2ed; --card:#ffffff; --ink:#242a26; --ink2:#3c433d;
  --muted:#807d72; --muted2:#93998f; --line:#e6e4dc; --line2:#eceae2;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#cfccc2;border-radius:6px}
h1,h2,h3{font-family:'Sora',sans-serif;margin:0}
.mono{font-family:'IBM Plex Mono',monospace}
.gold{color:var(--gold-d)}
a{color:var(--gold-d);text-decoration:none}

/* ---------- Login ---------- */
#login{position:fixed;inset:0;display:grid;grid-template-columns:1fr 1fr;background:var(--onyx)}
#login .brandcol{background:var(--onyx);padding:56px 48px;display:flex;flex-direction:column;justify-content:center}
#login .formcol{background:var(--onyx2);padding:44px 40px;display:flex;flex-direction:column;justify-content:center}
.emblem{width:64px;height:64px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;color:var(--gold);font-family:'Sora';font-weight:800;font-size:30px}
.kicker{font-size:10px;letter-spacing:.38em;color:var(--gold);font-weight:600;font-family:'Sora'}
.wordmark{font-family:'Sora';font-weight:700;font-size:30px;letter-spacing:.02em;color:var(--ivory);line-height:1}
.subm{font-size:9.5px;letter-spacing:.22em;color:var(--muted);margin-top:6px}
.tagline{font-family:'Sora';font-weight:600;font-size:19px;color:var(--gold-l);line-height:1.35;margin-top:40px}
.formcard{width:100%;max-width:360px;margin:0 auto}
.formcard h2{color:var(--ivory);font-size:22px}
.formcard .hint{font-size:12.5px;color:var(--muted);margin-top:5px;margin-bottom:24px}
.field-lbl{font-size:11px;color:var(--muted2);margin-bottom:6px;display:block}
.inp-dark{width:100%;height:44px;border:1px solid rgba(255,255,255,.12);border-radius:10px;background:var(--onyx);color:var(--ivory);padding:0 14px;font-size:14px;outline:none;margin-bottom:16px}
.inp-dark:focus{border-color:var(--gold)}
.btn-gold{height:46px;border:none;border-radius:10px;background:var(--gold);color:#0A0A0A;font-size:14px;font-weight:700;font-family:'Sora';width:100%}
.btn-gold:hover{background:var(--gold-l)}
.biz{display:flex;gap:9px;align-items:center;margin-top:18px}
.biz .dot{width:7px;height:7px;border-radius:50%;flex:none}
.biz .lbl{font-size:11px;color:var(--muted2);line-height:1.4}
.err{color:#e8998f;font-size:12.5px;margin-top:6px;min-height:16px}
.creds{margin-top:22px;border-top:1px solid rgba(255,255,255,.08);padding-top:14px}
.creds .t{font-size:10px;letter-spacing:.2em;color:var(--muted);margin-bottom:8px}
.creds .row{font-size:11px;color:var(--muted2);font-family:'IBM Plex Mono';line-height:1.7;cursor:pointer}
.creds .row:hover{color:var(--gold-l)}

/* ---------- Shell ---------- */
#shell{display:grid;grid-template-columns:248px 1fr;height:100%}
#side{background:var(--sidebar);color:#cfc9b8;display:flex;flex-direction:column;overflow-y:auto}
#side .head{padding:20px 18px 14px;display:flex;align-items:center;gap:11px;border-bottom:1px solid rgba(255,255,255,.06)}
#side .emblem-sm{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;color:var(--gold);font-family:'Sora';font-weight:800;font-size:15px;flex:none}
#side .grp{padding:14px 12px 2px}
#side .grp .gt{font-size:9.5px;letter-spacing:.18em;color:#6d6857;text-transform:uppercase;padding:0 8px 6px}
.navitem{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;font-size:13px;color:#c7c1b1;cursor:pointer;margin-bottom:1px}
.navitem:hover{background:rgba(255,255,255,.05);color:#fff}
.navitem.active{background:var(--gold);color:#0A0A0A;font-weight:600}
.navitem svg{width:16px;height:16px;flex:none}
#main{display:flex;flex-direction:column;min-width:0;overflow:hidden}
#top{height:64px;border-bottom:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 26px;flex:none}
#top .tt{font-size:17px;font-weight:700}
#top .ts{font-size:12px;color:var(--muted);margin-top:2px}
#top .user{display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--gold);color:#0A0A0A;display:flex;align-items:center;justify-content:center;font-family:'Sora';font-weight:700;font-size:13px}
.btn-ghost{height:34px;padding:0 13px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink2);font-size:12.5px;font-weight:600}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold-d)}
#content{padding:24px 26px;overflow-y:auto}

/* ---------- Components ---------- */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
.kpi .k{font-size:11px;color:var(--muted);letter-spacing:.02em}
.kpi .v{font-family:'Sora';font-weight:700;font-size:24px;margin-top:6px}
.kpi .s{font-size:11.5px;color:var(--muted2);margin-top:4px}
.sect{margin-top:26px}
.sect h3{font-size:14px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;text-align:left;padding:11px 14px;border-bottom:1px solid var(--line);background:#faf9f5;font-weight:600}
td{font-size:13px;padding:11px 14px;border-bottom:1px solid var(--line2);color:var(--ink2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fcfbf7}
.pill{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:20px}
.pill.gold{background:#f7efd3;color:var(--gold-d)}
.pill.green{background:#e3f5e9;color:#1f8a4c}
.pill.red{background:#fbe6e2;color:#c14a34}
.pill.blue{background:#e5eefb;color:#2563a8}
.pill.gray{background:#eeece5;color:#6d6857}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:12px}
.btn-primary{height:38px;padding:0 16px;border:none;border-radius:9px;background:var(--gold);color:#0A0A0A;font-size:13px;font-weight:700;font-family:'Sora'}
.btn-primary:hover{background:var(--gold-l)}
.btn-sm{height:30px;padding:0 11px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink2);font-size:12px;font-weight:600}
.btn-sm:hover{border-color:var(--gold);color:var(--gold-d)}
.inp{height:38px;border:1px solid #dcdfd6;border-radius:8px;padding:0 12px;font-size:13px;color:var(--ink);background:#fff;outline:none;width:100%}
.inp:focus{border-color:var(--gold)}
label.fl{font-size:11px;color:var(--muted);margin-bottom:5px;display:block}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.muted{color:var(--muted)}
.empty{padding:40px;text-align:center;color:var(--muted);font-size:13px}
.spin{width:22px;height:22px;border:2.5px solid #e6e2d4;border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite;margin:40px auto}
@keyframes sp{to{transform:rotate(360deg)}}

/* Modal */
#modal{position:fixed;inset:0;background:rgba(10,10,10,.5);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
#modal.on{display:flex}
.modal-box{background:#fff;border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:24px}
.modal-box h3{font-size:17px;margin-bottom:16px}
.mrow{margin-bottom:12px}
.mactions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}

/* Toast */
#toast{position:fixed;bottom:22px;right:22px;z-index:80;display:flex;flex-direction:column;gap:8px}
.tst{background:#131109;color:#fff;border-left:3px solid var(--gold);padding:12px 16px;border-radius:8px;font-size:13px;max-width:360px;box-shadow:0 8px 24px rgba(0,0,0,.25);animation:slideup .25s}
.tst.ok{border-left-color:#2fae63}.tst.err{border-left-color:#e05a3c}
@keyframes slideup{from{transform:translateY(10px);opacity:0}}
.gate{background:var(--onyx2);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:26px;max-width:420px;color:var(--ivory)}
@media(max-width:860px){#shell{grid-template-columns:1fr}#side{display:none}#login{grid-template-columns:1fr}#login .brandcol{display:none}}
</style>
</head>
<body>
<div id="app"><div class="spin"></div></div>
<div id="modal"><div class="modal-box" id="modal-box"></div></div>
<div id="toast"></div>

<script>
(function(){
"use strict";
const API = '/api/v1';
const LS = { access:'ck_access', refresh:'ck_refresh', user:'ck_user' };

// ---------- Estado ----------
const S = {
  user: null,           // { id, nome, usuario, acesso, setor, cargo }
  access: null,         // token
  refresh: null,
  route: 'dashboard',
  loading: false,
  cache: {},            // dados por rota
  loginErr:'', gate:null, gateErr:'',
};

// ---------- RBAC (espelho do backend) ----------
const ACCESS = {
  total:'*',
  comercial:['dashboard','tv','vendas','clientes','medidas','comissoes','precificacao','receber'],
  producao:['dashboard','tv','pcp','producao','piloto','compras','estoque','medidas','produtos','materia','aviamentos','regras'],
  chao:['tv','producao','piloto','estoque'],
  expedicao:['dashboard','tv','estoque','expedicao'],
  financeiro:['dashboard','tv','receber','pagar','fluxo','impostos','comissoes'],
};
const NAVDEF = [
  ['Visão geral', [['dashboard','Dashboard','grid'],['tv','Painel de TV','tv']]],
  ['Comercial', [['vendas','Vendas / Pedidos','cart'],['clientes','Clientes','users'],['medidas','Ficha de Medidas','ruler'],['comissoes','Comissões','pct'],['precificacao','Precificação','tag']]],
  ['Produção / PCP', [['pcp','Painel de PCP','cal'],['producao','Ordens de Produção','fact'],['piloto','Peças Piloto','clip'],['compras','Ordens de Compra','bag']]],
  ['Estoque & Logística', [['estoque','Estoque','box'],['expedicao','Expedição','truck']]],
  ['Financeiro', [['receber','A Receber','in'],['pagar','A Pagar','out'],['fluxo','Fluxo de Caixa','trend'],['impostos','Impostos','file']]],
  ['Cadastros', [['produtos','Produtos','shirt'],['materia','Matéria-prima','layers'],['aviamentos','Aviamentos','scissors'],['fornecedores','Fornecedores','users'],['regras','Categorias & Regras','book']]],
  ['Administração', [['usuarios','Usuários & Acessos','shield'],['logs','Auditoria / Logs','clock']]],
];
// telas já implementadas nesta fatia vertical
const READY = new Set(['dashboard','clientes','produtos','vendas','materia','fornecedores','receber','pagar','fluxo','comissoes','impostos','pcp','producao','piloto','compras','estoque','expedicao','usuarios','logs','medidas','precificacao','aviamentos','tv','regras']);
const TITLES = {
  dashboard:['Dashboard','Visão geral · indicadores consolidados'],
  vendas:['Vendas / Pedidos','Do orçamento à expedição · automação'],
  clientes:['Clientes','Cadastro central de clientes'],
  produtos:['Produtos','Catálogo · SKU PRD-CAT-0000'],
  materia:['Matéria-prima','Tecidos e insumos · MP-CAT-0000'],
  fornecedores:['Fornecedores','Fornecedores e facções'],
  receber:['Contas a Receber','O que os clientes devem'],
  pagar:['Contas a Pagar','Fornecedores, facção e despesas'],
  fluxo:['Fluxo de Caixa','Realizado e projeção por vencimento'],
  comissoes:['Comissões','Comissão por venda e por vendedor'],
  impostos:['Impostos — Lucro Presumido','Estimativa de tributos federais'],
  pcp:['Painel de PCP','Programação, capacidade e prazos das OPs'],
  producao:['Ordens de Produção','Quadro de OPs por etapa'],
  piloto:['Peças Piloto','Trava a produção até a aprovação da amostra'],
  compras:['Ordens de Compra','Geradas por déficit de material'],
  estoque:['Estoque — Produto Acabado','Saldo por item e rastreio por lote'],
  expedicao:['Expedição','Envios com rastreio, NF e lote consumido'],
  usuarios:['Usuários & Acessos','Gestão de logins e permissões · admin'],
  logs:['Auditoria / Logs','Histórico de ações no sistema · admin'],
  medidas:['Ficha de Medidas','Grade de tamanhos por colaborador do cliente'],
  precificacao:['Precificação','Ficha de custo · preço sugerido pela margem'],
  aviamentos:['Aviamentos','Botões, zíperes, etiquetas · AVI-CAT-0000'],
  tv:['Painel de Setor','Modo TV · produção em tempo real'],
  regras:['Categorias & Regras','Padronização de códigos do sistema'],
};
const ICONS = {
  grid:'M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z',
  cart:'M3 4h2l2.2 11.2a1 1 0 001 .8h8.6a1 1 0 001-.8L20 8H6M9 20a1 1 0 100-.01M17 20a1 1 0 100-.01',
  users:'M17 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2M9.5 11a3.5 3.5 0 100-7 3.5 3.5 0 000 7M22 21v-2a4 4 0 00-3-3.87',
  pct:'M19 5L5 19M7 7a1.6 1.6 0 100 .01M17 17a1.6 1.6 0 100 .01',
  cal:'M4 5h16v16H4zM4 9h16M8 3v4M16 3v4',
  fact:'M3 21V9l6 4V9l6 4V5l6 3v13z',
  clip:'M9 4h6v3H9zM7 6h10v14H7z',
  bag:'M6 7h12l-1 13H7zM9 7a3 3 0 016 0',
  box:'M3 7l9-4 9 4-9 4zM3 7v10l9 4 9-4V7',
  truck:'M3 6h11v9H3zM14 9h4l3 3v3h-7M7 19a1.5 1.5 0 100-.01M18 19a1.5 1.5 0 100-.01',
  in:'M12 3v12M7 10l5 5 5-5M4 21h16',
  out:'M12 15V3M7 8l5-5 5 5M4 21h16',
  trend:'M3 17l6-6 4 4 8-8M15 7h6v6',
  file:'M6 2h9l5 5v15H6zM14 2v6h6',
  shirt:'M6 4l3-2 3 2 3-2 3 2-3 3v13H9V7z',
  layers:'M12 3l9 5-9 5-9-5zM3 13l9 5 9-5',
  shield:'M12 3l8 3v6c0 5-4 8-8 9-4-1-8-4-8-9V6z',
  clock:'M12 7v5l3 2M12 3a9 9 0 100 18 9 9 0 000-18',
  tv:'M3 7h18v11H3zM8 21h8M8 3l4 4 4-4',
  ruler:'M3 17L17 3l4 4L7 21zM8 12l2 2M11 9l2 2M14 6l2 2',
  tag:'M3 12V3h9l9 9-9 9zM7.5 7.5a.5.5 0 100 .01',
  scissors:'M6 9a3 3 0 100-6 3 3 0 000 6M6 21a3 3 0 100-6 3 3 0 000 6M20 4L8.5 15.5M20 20L8.5 8.5',
  book:'M4 19V5a2 2 0 012-2h14v18H6a2 2 0 01-2-2zM4 17h16',
};
function icon(k){ const d=ICONS[k]||'M5 12h14'; return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="'+d+'"/></svg>'; }

// ---------- Utilidades ----------
const BRL = new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'});
const money = v => BRL.format(Number(v||0));
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const iniciais = n => String(n||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
const $ = id => document.getElementById(id);
function toast(msg, kind){ const el=document.createElement('div'); el.className='tst '+(kind||''); el.textContent=msg; $('toast').appendChild(el); setTimeout(()=>el.remove(), 4200); }

// ---------- API ----------
async function api(path, opts){
  opts = opts || {};
  const headers = Object.assign({'Content-Type':'application/json'}, opts.headers||{});
  if(S.access && !opts.noauth) headers['Authorization'] = 'Bearer '+S.access;
  let res = await fetch(API+path, { method:opts.method||'GET', headers, body: opts.body?JSON.stringify(opts.body):undefined });
  if(res.status===401 && !opts.noauth && !opts._retry && S.refresh){
    const ok = await tryRefresh();
    if(ok) return api(path, Object.assign({}, opts, {_retry:true}));
  }
  const text = await res.text();
  let data = null; try{ data = text?JSON.parse(text):null; }catch(e){ data = text; }
  if(!res.ok){
    const msg = (data && (data.message||data.error)) || ('Erro '+res.status);
    const e = new Error(Array.isArray(msg)?msg.join(' · '):msg); e.status=res.status; e.data=data; throw e;
  }
  return data;
}
async function tryRefresh(){
  try{
    const d = await api('/auth/refresh', {method:'POST', noauth:true, body:{refreshToken:S.refresh}});
    S.access=d.accessToken; S.refresh=d.refreshToken;
    localStorage.setItem(LS.access,S.access); localStorage.setItem(LS.refresh,S.refresh);
    return true;
  }catch(e){ logout(true); return false; }
}

// ---------- Auth ----------
async function doLogin(usuario, senha){
  S.loginErr=''; renderLogin();
  try{
    const d = await api('/auth/login', {method:'POST', noauth:true, body:{usuario, senha}});
    onAuthed(d);
  }catch(e){
    if(e.status===403){ // fora do horário -> gate do admin
      S.gate = { usuario, senha }; S.gateErr=''; renderLogin();
    } else { S.loginErr = e.message || 'Falha no login.'; renderLogin(); }
  }
}
async function doGate(adminUsuario, adminSenha){
  S.gateErr=''; renderLogin();
  try{
    const d = await api('/auth/authorize-offhours', {method:'POST', noauth:true,
      body:{ usuario:S.gate.usuario, senha:S.gate.senha, adminUsuario, adminSenha }});
    S.gate=null; onAuthed(d);
  }catch(e){ S.gateErr = e.message || 'Autorização negada.'; renderLogin(); }
}
function onAuthed(d){
  S.access=d.accessToken; S.refresh=d.refreshToken; S.user=d.usuario;
  localStorage.setItem(LS.access,S.access); localStorage.setItem(LS.refresh,S.refresh);
  localStorage.setItem(LS.user, JSON.stringify(d.usuario));
  const allowed = ACCESS[S.user.acesso];
  S.route = (allowed==='*') ? 'dashboard' : (allowed.includes('dashboard')?'dashboard':firstReady(allowed));
  S.cache={};
  renderShell(); loadRoute();
  toast('Bem-vindo, '+S.user.nome.split(' ')[0]+'!', 'ok');
}
function firstReady(allowed){ for(const r of allowed){ if(READY.has(r)) return r; } return allowed[0]; }
function logout(silent){
  S.user=S.access=S.refresh=null; S.cache={};
  localStorage.removeItem(LS.access); localStorage.removeItem(LS.refresh); localStorage.removeItem(LS.user);
  renderLogin(); if(!silent) toast('Sessão encerrada.');
}
function canAccess(route){ const a=ACCESS[S.user.acesso]; return a==='*'||a.includes(route); }

// ---------- Render: Login ----------
function renderLogin(){
  const gate = S.gate;
  $('app').innerHTML = `
  <div id="login">
    <div class="brandcol">
      <div class="emblem">C</div>
      <div style="margin-top:24px">
        <div class="kicker">GRUPO</div>
        <div class="wordmark">CHERKESIAN</div>
        <div class="subm">UNIFORMES PROFISSIONAIS</div>
      </div>
      <div class="tagline">"Vestindo quem<br>faz acontecer"</div>
    </div>
    <div class="formcol">
      <div class="formcard">
        ${ gate ? gateHtml() : loginHtml() }
      </div>
    </div>
  </div>`;
  if(gate){ const g=$('g_admin'); if(g) g.focus(); }
  else { const u=$('l_user'); if(u) u.focus(); }
}
function loginHtml(){
  return `
    <h2>Acessar o ERP</h2>
    <div class="hint">Entre com seu usuário e senha</div>
    <label class="field-lbl">Usuário</label>
    <input id="l_user" class="inp-dark" placeholder="ex.: admin" autocomplete="username">
    <label class="field-lbl">Senha</label>
    <input id="l_pass" class="inp-dark" type="password" placeholder="••••••••" autocomplete="current-password">
    <div class="err">${esc(S.loginErr)}</div>
    <button class="btn-gold" onclick="APP.login()">Entrar</button>
    <div class="creds">
      <div class="t">CONTAS DE DEMONSTRAÇÃO (clique para preencher)</div>
      <div class="row" onclick="APP.fill('admin','cherkesian')">admin / cherkesian · Administrador</div>

  c.innerHTML = `<div class="spin"></div>`;
  try{
    if(S.route==='dashboard') return await viewDashboard(c);
    if(S.route==='clientes') return await viewClientes(c);
    if(S.route==='produtos') return await viewProdutos(c);

    if(S.route==='producao') return await viewProducao(c);
    if(S.route==='piloto') return await viewPiloto(c);
    if(S.route==='compras') return await viewCompras(c);
    if(S.route==='estoque') return await viewEstoque(c);
    if(S.route==='expedicao') return await viewExpedicao(c);
    if(S.route==='usuarios') return await viewUsuarios(c);
    if(S.route==='logs') return await viewLogs(c);

    if(S.route==='precificacao') return await viewPrecificacao(c);

let PITENS = [];
async function formPedido(){
  PITENS = [{}];
  const [clientes, produtos] = await Promise.all([api('/clientes'), api('/produtos')]);
  window.__PROD = produtos;
  const clientesOpts = clientes.map(c=>`<option value="${c.id}">${esc(c.nome)}</option>`).join('');
  openModal(`<h3>Novo pedido</h3>
    <div class="mrow"><label class="fl">Cliente *</label><select id="f_cli" class="inp">${clientesOpts||'<option>—</option>'}</select></div>
    <label class="fl">Itens</label>
    <div id="pitens"></div>
    <button class="btn-sm" onclick="APP.addItem()" style="margin-top:8px">+ Adicionar item</button>
    ${field('f_pag','Forma de pagamento','placeholder="ex.: 50% sinal + 50% 28DDL"')}
    <div class="mactions"><button class="btn-sm" onclick="APP.closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="APP.savePedido()">Criar pedido</button></div>`);
  renderItens();
}
function renderItens(){
  const prods = window.__PROD||[];
  const opts = prods.map(p=>`<option value="${p.id}" data-preco="${p.precoBase||''}">${esc(p.codigo)} · ${esc(p.descricao)}</option>`).join('');
  $('pitens').innerHTML = PITENS.map((it,i)=>`
    <div class="grid3" style="margin-bottom:8px;align-items:end">
      <div><select class="inp" id="it_prod_${i}" onchange="APP.itemPreco(${i})"><option value="">— produto —</option>${opts}</select></div>
      <div><input class="inp" id="it_qtd_${i}" type="number" min="1" placeholder="qtd" value="${it.qtd||''}"></div>
      <div style="display:flex;gap:6px"><input class="inp" id="it_val_${i}" type="number" step="0.01" placeholder="valor unit." value="${it.val||''}">
        ${PITENS.length>1?`<button class="btn-sm" onclick="APP.rmItem(${i})">×</button>`:''}</div>
    </div>`).join('');
}
function addItem(){ PITENS.push({}); renderItens(); }
function rmItem(i){ PITENS.splice(i,1); renderItens(); }
function itemPreco(i){ const s=$('it_prod_'+i); const p=s.selectedOptions[0]?s.selectedOptions[0].getAttribute('data-preco'):''; if(p && !$('it_val_'+i).value) $('it_val_'+i).value=p; }
async function savePedido(){
  const clienteId = Number(val('f_cli'));
  const itens = [];
  for(let i=0;i<PITENS.length;i++){
    const pid=val('it_prod_'+i), q=val('it_qtd_'+i), v=val('it_val_'+i);
    if(!pid) continue;
    itens.push({ produtoId:Number(pid), quantidade:Number(q), valorUnit:Number(v) });
  }
  if(!clienteId){ toast('Selecione o cliente.','err'); return; }
  if(!itens.length){ toast('Adicione ao menos um item com produto.','err'); return; }
  const body = { clienteId, itens }; const pag=val('f_pag'); if(pag) body.formaPagamento=pag;
  try{ const p=await api('/pedidos',{method:'POST',body}); closeModal(); toast('Pedido '+p.numero+' criado'+(p.exigePiloto?' (exige piloto)':'')+'.','ok'); loadRoute(); }
  catch(e){ toast(e.message,'err'); }
}

  try{ const p=await api('/pedidos/'+id+'/aprovar',{method:'POST'}); toast('Pedido aprovado → etapa '+p.etapa+'.','ok'); loadRoute(); }
  catch(e){ toast(e.message,'err'); }
}
async function gerarOp(id){
  try{
    const r = await api('/pedidos/'+id+'/gerar-op',{method:'POST'});
    if(r.status==='op_gerada') toast('OP '+r.op.numero+' gerada! Material baixado.','ok');
    else if(r.status==='bloqueado_material'){ const oc=r.ordensCompra.map(o=>o.numero).join(', '); toast('Bloqueado por material. Ordem(ns) de compra criada(s): '+oc,'err'); }
    else if(r.status==='bloqueado_piloto') toast('Bloqueado: '+r.message,'err');
    loadRoute();
  }catch(e){ toast(e.message,'err'); }
}

const OP_STATUS = ['aguardando_material','a_iniciar','em_corte','em_producao','em_faccao','concluido'];
const PIL_STATUS = ['em_desenvolvimento','enviada_ao_cliente','aprovada','aprovada_c_ajustes','reprovada'];
function opPill(s){ const c = s==='concluido'?'green':(s==='aguardando_material'?'red':(s==='a_iniciar'?'gold':'blue')); return `<span class="pill ${c}">${esc(s.replace(/_/g,' '))}</span>`; }
function pilPill(s){ const c = (s==='aprovada'||s==='aprovada_c_ajustes')?'green':(s==='reprovada'?'red':(s==='enviada_ao_cliente'?'blue':'gold')); return `<span class="pill ${c}">${esc(s.replace(/_/g,' '))}</span>`; }
function ocPill(s){ const c = s==='recebida'?'green':(s==='cancelada'?'red':'gold'); return `<span class="pill ${c}">${esc(s)}</span>`; }
function prioPill(p){ const c = p==='alta'?'red':(p==='baixa'?'gray':'gold'); return `<span class="pill ${c}">${esc(p)}</span>`; }
function bar(pct){ pct=Number(pct||0); return `<div style="display:flex;align-items:center;gap:8px"><div style="flex:1;height:7px;background:#eceae2;border-radius:6px;overflow:hidden;min-width:60px"><div style="height:100%;width:${pct}%;background:var(--gold)"></div></div><span style="font-size:11px;color:var(--muted)">${pct}%</span></div>`; }

async function loadCusto(){
  const id = val('pr_prod'); const out = $('pr_out');
  if(!id){ out.innerHTML = '<div class="empty">Selecione um produto.</div>'; return; }
  out.innerHTML = '<div class="spin"></div>';
  try{
    const d = await api('/produtos/'+id+'/custo');
    window.__CUSTO = Number(d.custoMaterial);
    out.innerHTML = `
      <div class="sect" style="margin-top:0"><h3>Consumo (BOM) · ${esc(d.produto.codigo)}</h3>` +
      (d.itens.length ? panelTable(['Material','Descrição','Qtd','Custo unit.','Subtotal'],
        d.itens.map(i=>[`<span class="mono gold">${esc(i.material)}</span>`, esc(i.descricao), esc(i.quantidade)+' '+esc(i.unidade), money(i.custoUnit), `<b>${money(i.subtotal)}</b>`]))
        : '<div class="panel"><div class="empty">Este produto ainda não tem receita (BOM) cadastrada.</div></div>') + `</div>
      <div class="sect"><h3>Composição do preço</h3>
        <div class="panel" style="padding:18px">
          <div class="grid3">
            <div><label class="fl">Custo de material (BOM)</label><input class="inp" value="${money(d.custoMaterial)}" disabled></div>
            ${field('pr_mo','Mão de obra + facção (R$)','type="number" step="0.01" value="0" oninput="APP.calcPreco()"')}
            ${field('pr_outros','Outros custos (R$)','type="number" step="0.01" value="0" oninput="APP.calcPreco()"')}
          </div>
          <div class="grid2" style="margin-top:4px">
            ${field('pr_imp','Impostos sobre venda (%)','type="number" step="0.01" value="5.93" oninput="APP.calcPreco()"')}
            ${field('pr_marg','Margem desejada (%)','type="number" step="0.5" value="40" oninput="APP.calcPreco()"')}
          </div>
          <div id="pr_res" style="margin-top:10px"></div>
        </div>
      </div>`;
    calcPreco();
  }catch(e){ out.innerHTML = `<div class="empty" style="color:#c14a34">${esc(e.message)}</div>`; }
}
function calcPreco(){
  const custo = (window.__CUSTO||0) + Number(val('pr_mo')||0) + Number(val('pr_outros')||0);
  const imp = Number(val('pr_imp')||0), marg = Number(val('pr_marg')||0);
  const divisor = 1 - (imp+marg)/100;
  const el = $('pr_res'); if(!el) return;
  if(divisor <= 0){ el.innerHTML = '<div class="err">Impostos + margem não podem somar 100% ou mais.</div>'; return; }
  const preco = custo/divisor, lucro = preco*marg/100;
  el.innerHTML = `<div class="cards">
    ${kpi('Custo total da peça', money(custo), 'material + mão de obra + outros')}
    ${kpi('Preço de venda sugerido', money(preco), 'markup divisor: 1 − (imp% + margem%)')}
    ${kpi('Lucro estimado / peça', money(lucro), marg+'% sobre o preço')}
  </div>`;
}

        <table><tbody>${SEQ.map(([n,x])=>`<tr><td>${n}</td><td style="text-align:right"><span class="mono gold">${x}</span></td></tr>`).join('')}</tbody></table></div>
    </div>`;
}

// ---------- Documentos (PDF em papel timbrado) ----------
async function gerarDoc(tipo, refId){
  try{
    const d = await api('/documentos/'+tipo, {method:'POST', body:{referenciaId:refId}});
    const r = await fetch(d.urlPdf, { headers: { Authorization:'Bearer '+S.access } });
    if(!r.ok) throw new Error('Falha ao baixar o PDF ('+r.status+').');
    const blob = await r.blob();
    window.open(URL.createObjectURL(blob), '_blank');
    toast('Documento '+d.numero+' gerado.','ok');
  }catch(e){ toast(e.message,'err'); }
}

// ---------- Bootstrap ----------
function boot(){
  S.access = localStorage.getItem(LS.access);
  S.refresh = localStorage.getItem(LS.refresh);
  try{ S.user = JSON.parse(localStorage.getItem(LS.user)||'null'); }catch(e){ S.user=null; }
  if(S.access && S.user){
    const allowed = ACCESS[S.user.acesso];
    S.route = (allowed==='*'||allowed.includes('dashboard'))?'dashboard':firstReady(allowed);
    renderShell(); loadRoute();
  } else { renderLogin(); }
}

// ---------- API pública p/ onclick ----------
window.APP = {
  login(){ doLogin(val('l_user'), $('l_pass').value); },
  fill(u,p){ $('l_user').value=u; $('l_pass').value=p; },
  gate(){ doGate(val('g_admin'), $('g_pass').value); },
  cancelGate(){ S.gate=null; renderLogin(); },
  logout(){ logout(); },
  go(r){ go(r); },
  closeModal, formCliente, saveCliente, formProduto, saveProduto,
  formMaterial, saveMaterial, formFornecedor, saveFornecedor,
  formPedido, addItem, rmItem, itemPreco, savePedido, aprovarPedido, gerarOp,
  formReceber, saveReceber, formPagar, savePagar, baixar, confirmBaixar,
  formComissao, comTot, saveComissao, pagarComissao,
  formOp, saveOp, formPiloto, savePiloto, aprovarPiloto,
  formCompra, ocMat, saveCompra, receberCompra, cancelarCompra,
  formMov, saveMov, verLotes, formExpedicao, saveExpedicao,
  formUsuario, saveUsuario, removeUsuario,
  formMedida, saveMedida, removeMedida, loadCusto, calcPreco,
  formAviamento, saveAviamento, gerarDoc,
};
document.getElementById('modal').addEventListener('click', e=>{ if(e.target.id==='modal') closeModal(); });
boot();
})();
