<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cherkesian ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --onyx:#0A0A0A; --onyx2:#100f0d; --sidebar:#131109; --sidebar2:#1b1810;
  --gold:#C9A227; --gold-d:#9a7d1e; --gold-l:#E4C76B;
  --ivory:#F4F2ED; --bg:#f4f2ed; --card:#ffffff; --ink:#242a26; --ink2:#3c433d;
  --muted:#807d72; --muted2:#93998f; --line:#e6e4dc; --line2:#eceae2;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#cfccc2;border-radius:6px}
h1,h2,h3{font-family:'Sora',sans-serif;margin:0}
.mono{font-family:'IBM Plex Mono',monospace}
.gold{color:var(--gold-d)}
a{color:var(--gold-d);text-decoration:none}

/* ---------- Login ---------- */
#login{position:fixed;inset:0;display:grid;grid-template-columns:1fr 1fr;background:var(--onyx)}
#login .brandcol{background:var(--onyx);padding:56px 48px;display:flex;flex-direction:column;justify-content:center}
#login .formcol{background:var(--onyx2);padding:44px 40px;display:flex;flex-direction:column;justify-content:center}
.emblem{width:64px;height:64px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;color:var(--gold);font-family:'Sora';font-weight:800;font-size:30px}
.kicker{font-size:10px;letter-spacing:.38em;color:var(--gold);font-weight:600;font-family:'Sora'}
.wordmark{font-family:'Sora';font-weight:700;font-size:30px;letter-spacing:.02em;color:var(--ivory);line-height:1}
.subm{font-size:9.5px;letter-spacing:.22em;color:var(--muted);margin-top:6px}
.tagline{font-family:'Sora';font-weight:600;font-size:19px;color:var(--gold-l);line-height:1.35;margin-top:40px}
.formcard{width:100%;max-width:360px;margin:0 auto}
.formcard h2{color:var(--ivory);font-size:22px}
.formcard .hint{font-size:12.5px;color:var(--muted);margin-top:5px;margin-bottom:24px}
.field-lbl{font-size:11px;color:var(--muted2);margin-bottom:6px;display:block}
.inp-dark{width:100%;height:44px;border:1px solid rgba(255,255,255,.12);border-radius:10px;background:var(--onyx);color:var(--ivory);padding:0 14px;font-size:14px;outline:none;margin-bottom:16px}
.inp-dark:focus{border-color:var(--gold)}
.btn-gold{height:46px;border:none;border-radius:10px;background:var(--gold);color:#0A0A0A;font-size:14px;font-weight:700;font-family:'Sora';width:100%}
.btn-gold:hover{background:var(--gold-l)}
.biz{display:flex;gap:9px;align-items:center;margin-top:18px}
.biz .dot{width:7px;height:7px;border-radius:50%;flex:none}
.biz .lbl{font-size:11px;color:var(--muted2);line-height:1.4}
.err{color:#e8998f;font-size:12.5px;margin-top:6px;min-height:16px}
.creds{margin-top:22px;border-top:1px solid rgba(255,255,255,.08);padding-top:14px}
.creds .t{font-size:10px;letter-spacing:.2em;color:var(--muted);margin-bottom:8px}
.creds .row{font-size:11px;color:var(--muted2);font-family:'IBM Plex Mono';line-height:1.7;cursor:pointer}
.creds .row:hover{color:var(--gold-l)}

/* ---------- Shell ---------- */
#shell{display:grid;grid-template-columns:248px 1fr;height:100%}
#side{background:var(--sidebar);color:#cfc9b8;display:flex;flex-direction:column;overflow-y:auto}
#side .head{padding:20px 18px 14px;display:flex;align-items:center;gap:11px;border-bottom:1px solid rgba(255,255,255,.06)}
#side .emblem-sm{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;color:var(--gold);font-family:'Sora';font-weight:800;font-size:15px;flex:none}
#side .grp{padding:14px 12px 2px}
#side .grp .gt{font-size:9.5px;letter-spacing:.18em;color:#6d6857;text-transform:uppercase;padding:0 8px 6px}
.navitem{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;font-size:13px;color:#c7c1b1;cursor:pointer;margin-bottom:1px}
.navitem:hover{background:rgba(255,255,255,.05);color:#fff}
.navitem.active{background:var(--gold);color:#0A0A0A;font-weight:600}
.navitem svg{width:16px;height:16px;flex:none}
#main{display:flex;flex-direction:column;min-width:0;overflow:hidden}
#top{height:64px;border-bottom:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 26px;flex:none}
#top .tt{font-size:17px;font-weight:700}
#top .ts{font-size:12px;color:var(--muted);margin-top:2px}
#top .user{display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--gold);color:#0A0A0A;display:flex;align-items:center;justify-content:center;font-family:'Sora';font-weight:700;font-size:13px}
.btn-ghost{height:34px;padding:0 13px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink2);font-size:12.5px;font-weight:600}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold-d)}
#content{padding:24px 26px;overflow-y:auto}

/* ---------- Components ---------- */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
.kpi .k{font-size:11px;color:var(--muted);letter-spacing:.02em}
.kpi .v{font-family:'Sora';font-weight:700;font-size:24px;margin-top:6px}
.kpi .s{font-size:11.5px;color:var(--muted2);margin-top:4px}
.sect{margin-top:26px}
.sect h3{font-size:14px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;text-align:left;padding:11px 14px;border-bottom:1px solid var(--line);background:#faf9f5;font-weight:600}
td{font-size:13px;padding:11px 14px;border-bottom:1px solid var(--line2);color:var(--ink2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fcfbf7}
.pill{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:20px}
.pill.gold{background:#f7efd3;color:var(--gold-d)}
.pill.green{background:#e3f5e9;color:#1f8a4c}
.pill.red{background:#fbe6e2;color:#c14a34}
.pill.blue{background:#e5eefb;color:#2563a8}
.pill.gray{background:#eeece5;color:#6d6857}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:12px}
.btn-primary{height:38px;padding:0 16px;border:none;border-radius:9px;background:var(--gold);color:#0A0A0A;font-size:13px;font-weight:700;font-family:'Sora'}
.btn-primary:hover{background:var(--gold-l)}
.btn-sm{height:30px;padding:0 11px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink2);font-size:12px;font-weight:600}
.btn-sm:hover{border-color:var(--gold);color:var(--gold-d)}
.inp{height:38px;border:1px solid #dcdfd6;border-radius:8px;padding:0 12px;font-size:13px;color:var(--ink);background:#fff;outline:none;width:100%}
.inp:focus{border-color:var(--gold)}
label.fl{font-size:11px;color:var(--muted);margin-bottom:5px;display:block}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.muted{color:var(--muted)}
.empty{padding:40px;text-align:center;color:var(--muted);font-size:13px}
.spin{width:22px;height:22px;border:2.5px solid #e6e2d4;border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite;margin:40px auto}
@keyframes sp{to{transform:rotate(360deg)}}

/* Modal */
#modal{position:fixed;inset:0;background:rgba(10,10,10,.5);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
#modal.on{display:flex}
.modal-box{background:#fff;border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:24px}
.modal-box h3{font-size:17px;margin-bottom:16px}
.mrow{margin-bottom:12px}
.mactions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}

/* Toast */
#toast{position:fixed;bottom:22px;right:22px;z-index:80;display:flex;flex-direction:column;gap:8px}
.tst{background:#131109;color:#fff;border-left:3px solid var(--gold);padding:12px 16px;border-radius:8px;font-size:13px;max-width:360px;box-shadow:0 8px 24px rgba(0,0,0,.25);animation:slideup .25s}
.tst.ok{border-left-color:#2fae63}.tst.err{border-left-color:#e05a3c}
@keyframes slideup{from{transform:translateY(10px);opacity:0}}
.gate{background:var(--onyx2);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:26px;max-width:420px;color:var(--ivory)}
@media(max-width:860px){#shell{grid-template-columns:1fr}#side{display:none}#login{grid-template-columns:1fr}#login .brandcol{display:none}}
</style>
</head>
<body>
<div id="app"><div class="spin"></div></div>
<div id="modal"><div class="modal-box" id="modal-box"></div></div>
<div id="toast"></div>

<script>
(function(){
"use strict";
const API = '/api/v1';
const LS = { access:'ck_access', refresh:'ck_refresh', user:'ck_user' };

// ---------- Estado ----------
const S = {
  user: null,           // { id, nome, usuario, acesso, setor, cargo }
  access: null,         // token
  refresh: null,
  route: 'dashboard',
  loading: false,
  cache: {},            // dados por rota
  loginErr:'', gate:null, gateErr:'',
};

// ---------- RBAC (espelho do backend) ----------
const ACCESS = {
  total:'*',
  comercial:['dashboard','tv','vendas','clientes','medidas','comissoes','precificacao','receber','notas','agente'],
  producao:['dashboard','tv','pcp','producao','kits','piloto','compras','estoque','entrada','medidas','produtos','materia','aviamentos','regras','agente'],
  chao:['tv','producao','kits','piloto','estoque'],
  expedicao:['dashboard','tv','estoque','expedicao','kits','notas','agente'],
  financeiro:['dashboard','tv','receber','pagar','fluxo','impostos','comissoes','notas','agente'],
  contabilidade:['dashboard','tv','receber','pagar','fluxo','impostos','comissoes','vendas','clientes','notas','entrada','agente'],
  consultoria:['dashboard','tv','bi','pcp','producao','kits','expedicao','estoque','vendas','clientes','comissoes'],
};
const NAVDEF = [
  ['Visão geral', [['dashboard','Dashboard','grid'],['bi','BI Produção','trend'],['tv','Painel de TV','tv'],['agente','Assistente IA','spark']]],
  ['Comercial', [['vendas','Vendas / Pedidos','cart'],['clientes','Clientes','users'],['medidas','Ficha de Medidas','ruler'],['comissoes','Comissões','pct'],['precificacao','Precificação','tag']]],
  ['Produção / PCP', [['pcp','Painel de PCP','cal'],['producao','Ordens de Produção','fact'],['kits','Kits / Rastreio','box'],['piloto','Peças Piloto','clip'],['compras','Ordens de Compra','bag']]],
  ['Estoque & Logística', [['estoque','Estoque','box'],['expedicao','Expedição','truck'],['notas','Notas Fiscais','file'],['entrada','Notas de Entrada','bag']]],
  ['Financeiro', [['receber','A Receber','in'],['pagar','A Pagar','out'],['fluxo','Fluxo de Caixa','trend'],['impostos','Impostos','file']]],
  ['Cadastros', [['produtos','Produtos','shirt'],['materia','Matéria-prima','layers'],['aviamentos','Aviamentos','scissors'],['fornecedores','Fornecedores','users'],['regras','Categorias & Regras','book']]],
  ['Administração', [['filiais','Filiais / CNPJs','box'],['empresa','Config. Fiscal (NF-e)','file'],['usuarios','Usuários & Acessos','shield'],['logs','Auditoria / Logs','clock']]],
];
// telas já implementadas nesta fatia vertical
const READY = new Set(['dashboard','bi','clientes','produtos','vendas','materia','fornecedores','receber','pagar','fluxo','comissoes','impostos','pcp','producao','kits','piloto','compras','estoque','expedicao','usuarios','logs','medidas','precificacao','aviamentos','tv','regras','empresa','notas','entrada','agente','filiais']);
const TITLES = {
  dashboard:['Dashboard','Visão geral · indicadores consolidados'],
  bi:['BI de Produção','Produtividade da cadeia: lead time, gargalos, facções, faturamento × produção'],
  vendas:['Vendas / Pedidos','Do orçamento à expedição · automação'],
  clientes:['Clientes','Cadastro central de clientes'],
  produtos:['Produtos','Catálogo · SKU PRD-CAT-0000'],
  materia:['Matéria-prima','Tecidos e insumos · MP-CAT-0000'],
  fornecedores:['Fornecedores','Fornecedores e facções'],
  receber:['Contas a Receber','O que os clientes devem'],
  pagar:['Contas a Pagar','Fornecedores, facção e despesas'],
  fluxo:['Fluxo de Caixa','Realizado e projeção por vencimento'],
  comissoes:['Comissões','Comissão por venda e por vendedor'],
  impostos:['Impostos por empresa','Estimativa de tributos federais por regime (Real/Presumido/Simples)'],
  pcp:['Painel de PCP','Programação, capacidade e prazos das OPs'],
  producao:['Ordens de Produção','Quadro de OPs por etapa'],
  kits:['Kits / Rastreabilidade','Corte por kit · etiqueta Zebra · expedição/retorno facção · rastreio por lote'],
  piloto:['Peças Piloto','Trava a produção até a aprovação da amostra'],
  compras:['Ordens de Compra','Geradas por déficit de material'],
  entrada:['Notas de Entrada','NFs de compra · estoque e contas a pagar'],
  estoque:['Estoque — Produto Acabado','Saldo por item e rastreio por lote'],
  expedicao:['Expedição','Envios com rastreio, NF e lote consumido'],
  usuarios:['Usuários & Acessos','Gestão de logins e permissões · admin'],
  logs:['Auditoria / Logs','Histórico de ações no sistema · admin'],
  medidas:['Ficha de Medidas','Grade de tamanhos por colaborador do cliente'],
  precificacao:['Precificação','Ficha de custo · preço sugerido pela margem'],
  aviamentos:['Aviamentos','Botões, zíperes, etiquetas · AVI-CAT-0000'],
  tv:['Painel de Setor','Modo TV · produção em tempo real'],
  regras:['Categorias & Regras','Padronização de códigos do sistema'],
  empresa:['Configuração Fiscal','Empresa emitente da NF-e + numeração · admin'],
  filiais:['Filiais / CNPJs do grupo','Matriz e filiais emissoras de NF-e · admin'],
  notas:['Notas Fiscais','NF-e emitidas · status, chave e protocolo'],
  agente:['Assistente IA','Pergunte sobre pedidos, produção, estoque e financeiro'],
};
const ICONS = {
  grid:'M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z',
  cart:'M3 4h2l2.2 11.2a1 1 0 001 .8h8.6a1 1 0 001-.8L20 8H6M9 20a1 1 0 100-.01M17 20a1 1 0 100-.01',
  users:'M17 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2M9.5 11a3.5 3.5 0 100-7 3.5 3.5 0 000 7M22 21v-2a4 4 0 00-3-3.87',
  pct:'M19 5L5 19M7 7a1.6 1.6 0 100 .01M17 17a1.6 1.6 0 100 .01',
  cal:'M4 5h16v16H4zM4 9h16M8 3v4M16 3v4',
  fact:'M3 21V9l6 4V9l6 4V5l6 3v13z',
  clip:'M9 4h6v3H9zM7 6h10v14H7z',
  bag:'M6 7h12l-1 13H7zM9 7a3 3 0 016 0',
  box:'M3 7l9-4 9 4-9 4zM3 7v10l9 4 9-4V7',
  truck:'M3 6h11v9H3zM14 9h4l3 3v3h-7M7 19a1.5 1.5 0 100-.01M18 19a1.5 1.5 0 100-.01',
  in:'M12 3v12M7 10l5 5 5-5M4 21h16',
  out:'M12 15V3M7 8l5-5 5 5M4 21h16',
  trend:'M3 17l6-6 4 4 8-8M15 7h6v6',
  file:'M6 2h9l5 5v15H6zM14 2v6h6',
  shirt:'M6 4l3-2 3 2 3-2 3 2-3 3v13H9V7z',
  layers:'M12 3l9 5-9 5-9-5zM3 13l9 5 9-5',
  shield:'M12 3l8 3v6c0 5-4 8-8 9-4-1-8-4-8-9V6z',
  clock:'M12 7v5l3 2M12 3a9 9 0 100 18 9 9 0 000-18',
  tv:'M3 7h18v11H3zM8 21h8M8 3l4 4 4-4',
  ruler:'M3 17L17 3l4 4L7 21zM8 12l2 2M11 9l2 2M14 6l2 2',
  tag:'M3 12V3h9l9 9-9 9zM7.5 7.5a.5.5 0 100 .01',
  scissors:'M6 9a3 3 0 100-6 3 3 0 000 6M6 21a3 3 0 100-6 3 3 0 000 6M20 4L8.5 15.5M20 20L8.5 8.5',
  book:'M4 19V5a2 2 0 012-2h14v18H6a2 2 0 01-2-2zM4 17h16',
  spark:'M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8zM19 15l.9 2.1L22 18l-2.1.9L19 21l-.9-2.1L16 18l2.1-.9z',
};
function icon(k){ const d=ICONS[k]||'M5 12h14'; return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="'+d+'"/></svg>'; }

// ---------- Utilidades ----------
const BRL = new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'});
const money = v => BRL.format(Number(v||0));
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const iniciais = n => String(n||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
const $ = id => document.getElementById(id);
function toast(msg, kind){ const el=document.createElement('div'); el.className='tst '+(kind||''); el.textContent=msg; $('toast').appendChild(el); setTimeout(()=>el.remove(), 4200); }

// ---------- API ----------
async function api(path, opts){
  opts = opts || {};
  const headers = Object.assign({'Content-Type':'application/json'}, opts.headers||{});
  if(S.access && !opts.noauth) headers['Authorization'] = 'Bearer '+S.access;
  let res = await fetch(API+path, { method:opts.method||'GET', headers, body: opts.body?JSON.stringify(opts.body):undefined });
  if(res.status===401 && !opts.noauth && !opts._retry && S.refresh){
    const ok = await tryRefresh();
    if(ok) return api(path, Object.assign({}, opts, {_retry:true}));
  }
  const text = await res.text();
  let data = null; try{ data = text?JSON.parse(text):null; }catch(e){ data = text; }
  if(!res.ok){
    const msg = (data && (data.message||data.error)) || ('Erro '+res.status);
    const e = new Error(Array.isArray(msg)?msg.join(' · '):msg); e.status=res.status; e.data=data; throw e;
  }
  return data;
}
async function tryRefresh(){
  try{
    const d = await api('/auth/refresh', {method:'POST', noauth:true, body:{refreshToken:S.refresh}});
    S.access=d.accessToken; S.refresh=d.refreshToken;
    localStorage.setItem(LS.access,S.access); localStorage.setItem(LS.refresh,S.refresh);
    return true;
  }catch(e){ logout(true); return false; }
}

// ---------- Auth ----------
async function doLogin(usuario, senha){
  S.loginErr=''; renderLogin();
  try{
    const d = await api('/auth/login', {method:'POST', noauth:true, body:{usuario, senha}});
    onAuthed(d);
  }catch(e){
    if(e.status===403){ // fora do horário -> gate do admin
      S.gate = { usuario, senha }; S.gateErr=''; renderLogin();
    } else { S.loginErr = e.message || 'Falha no login.'; renderLogin(); }
  }
}
async function doGate(adminUsuario, adminSenha){
  S.gateErr=''; renderLogin();
  try{
    const d = await api('/auth/authorize-offhours', {method:'POST', noauth:true,
      body:{ usuario:S.gate.usuario, senha:S.gate.senha, adminUsuario, adminSenha }});
    S.gate=null; onAuthed(d);
  }catch(e){ S.gateErr = e.message || 'Autorização negada.'; renderLogin(); }
}
function onAuthed(d){
  S.access=d.accessToken; S.refresh=d.refreshToken; S.user=d.usuario;
  localStorage.setItem(LS.access,S.access); localStorage.setItem(LS.refresh,S.refresh);
  localStorage.setItem(LS.user, JSON.stringify(d.usuario));
  const allowed = ACCESS[S.user.acesso];
  S.route = (allowed==='*') ? 'dashboard' : (allowed.includes('dashboard')?'dashboard':firstReady(allowed));
  S.cache={};
  renderShell(); loadRoute();
  toast('Bem-vindo, '+S.user.nome.split(' ')[0]+'!', 'ok');
}
function firstReady(allowed){ for(const r of allowed){ if(READY.has(r)) return r; } return allowed[0]; }
function logout(silent){
  S.user=S.access=S.refresh=null; S.cache={};
  localStorage.removeItem(LS.access); localStorage.removeItem(LS.refresh); localStorage.removeItem(LS.user);
  renderLogin(); if(!silent) toast('Sessão encerrada.');
}

    <div class="chart-row">
      <div class="chart-lbl">${esc(e.label)}</div>

    </div>`).join('') +`</div>`;
}

function secDivisor(t){ return `<div style="border-top:1px solid var(--line);margin:12px 0 10px;padding-top:8px"><b style="font-size:11.5px;color:var(--muted);letter-spacing:.5px">${esc(t)}</b></div>`; }
function taField(idv,lbl,valor,rows,ph){ return `<div class="mrow"><label class="fl">${esc(lbl)}</label><textarea id="${idv}" class="inp" rows="${rows||4}" ${ph?'placeholder="'+esc(ph)+'"':''}>${esc(valor||'')}</textarea></div>`; }
function expandGradeJS(grade){
  const E=['PP','P','M','G','GG','G1','G2','G3','G4','G5','G6','G7','G8'];
  const t=(grade||'').trim().toUpperCase();
  const m=/^(\S+)\s+A[O]?\s+(\S+)$/.exec(t);
  if(m){ const i=E.indexOf(m[1]), f=E.indexOf(m[2]); if(i>=0&&f>=i) return E.slice(i,f+1); }
  return t.split(/[,;/ ]+/).map(s=>s.trim()).filter(Boolean).slice(0,16);
}
function deriveSizes(p){
  let s = expandGradeJS(p.grade);
  if(!s.length){ const set=[]; (p.medidas||[]).forEach(m=>Object.keys(m.valores||{}).forEach(k=>{ if(!set.includes(k)) set.push(k); })); s=set; }
  return s;
}
function fileToDataURL(file, maxDim, quality){
  return new Promise((resolve,reject)=>{
    const fr=new FileReader();
    fr.onload=()=>{ const img=new Image(); img.onload=()=>{
      let w=img.width, h=img.height;
      if(w>maxDim||h>maxDim){ const r=Math.min(maxDim/w,maxDim/h); w=Math.round(w*r); h=Math.round(h*r); }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      resolve(cv.toDataURL('image/jpeg',quality));
    }; img.onerror=reject; img.src=fr.result; };
    fr.onerror=reject; fr.readAsDataURL(file);
  });
}
function fotoThumb(kind){
  const u=(window.__FOTO||{})[kind];
  if(u) return `<img src="${u}" style="max-height:96px;max-width:100%;border:1px solid #e2ddce;border-radius:8px;display:block"><a onclick="APP.fotoDel('${kind}')" style="cursor:pointer;color:#c14a34;font-size:11px">remover</a>`;
  return `<span class="muted" style="font-size:12px">Nenhuma imagem selecionada.</span>`;
}

}

function pmedSync(){
  (window.__PMED||[]).forEach((r,i)=>{
    const d=$('pm_desc_'+i); if(!d) return;
    r.descricao=d.value; const tl=$('pm_tol_'+i); r.tolerancia=tl?tl.value:'';
    r.valores=r.valores||{};
    (window.__PMEDT||[]).forEach((t,j)=>{ const v=$('pm_val_'+i+'_'+j); if(v) r.valores[t]=v.value; });

function pmedRender(){
  const box=$('pmedbox'); if(!box) return;

  rows.forEach((r,i)=>{
    h+=`<tr><td><input class="inp sm" id="pm_desc_${i}" value="${esc(r.descricao||'')}" placeholder="medida"></td>`;
    h+=`<td><input class="inp sm" id="pm_tol_${i}" value="${esc(r.tolerancia||'')}" style="width:48px" placeholder="1 CM"></td>`;
    h+=T.map((t,j)=>`<td><input class="inp sm" id="pm_val_${i}_${j}" value="${esc((r.valores&&r.valores[t]!=null?r.valores[t]:''))}" style="width:44px"></td>`).join('');
    h+=`<td><button class="btn-sm" onclick="APP.pmedDel(${i})">×</button></td></tr>`;
  });
  h+=`</tbody></table></div>`;
  box.innerHTML=h;
}

async function saveProduto(id){
  pmedSync();
  const body = { categoria:val('f_cat'), descricao:val('f_desc'), cor:val('f_cor'), grade:val('f_grade'),
    referencia:val('f_ref'), marca:val('f_marca'), linha:val('f_linha'), grupo:val('f_grupo'),
    modelagem:val('f_model'), tecido:val('f_tec'), composicao:val('f_comp'),
    especificacoes:val('f_espec'), observacoes:val('f_obs'),
    ncm:val('f_ncm'), cfop:val('f_cfop'), unidadeComercial:val('f_un'), cest:val('f_cest'),
    icmsCst:val('f_icst'), pisCst:val('f_piscof'), cofinsCst:val('f_piscof') };
  const preco = val('f_preco'); if(preco) body.precoBase = Number(preco);
  const orig = val('f_orig'); if(orig!=='') body.origem = Number(orig);
  const ialq = val('f_ialq'); if(ialq) body.icmsAliquota = Number(ialq);
  if(!body.categoria||!body.descricao){ toast('Categoria e descrição são obrigatórias.','err'); return; }
  Object.keys(body).forEach(k=>{ if(body[k]==='') delete body[k]; });
  // fotos e medidas SEMPRE enviadas (string vazia limpa; medidas substituem a grade)
  const fm=window.__FOTO||{};
  body.fotoModelo = fm.modelo||''; body.fotoModelagem = fm.modelagem||'';
  body.medidas = (window.__PMED||[]).filter(r=>r.descricao&&r.descricao.trim())
    .map((r,i)=>({ descricao:r.descricao.trim(), tolerancia:(r.tolerancia||'').trim()||undefined, valores:r.valores||{}, ordem:i }));
  // Tamanhos: sincroniza o campo "Tamanhos (colunas)" para a grade — persiste sempre,
  // mesmo sem linhas de medida (corrige tamanhos que sumiam ao reabrir/na ficha).
  const tams = val('f_tam').split(/[,;/ ]+/).map(s=>s.trim().toUpperCase()).filter(Boolean).slice(0,16);
  const gradeStr = val('f_grade').trim() || tams.join(', ');
  body.grade = gradeStr; // string vazia limpa a grade
  try{ await api(id?('/produtos/'+id):'/produtos',{method:id?'PATCH':'POST',body}); closeModal(); toast('Produto salvo.','ok'); loadRoute(); }
  catch(e){ toast(e.message,'err'); }
}

let PITENS = [];
async function formPedido(id){
  const [clientes, produtos, filiais] = await Promise.all([api('/clientes'), api('/produtos'), api('/filiais')]);
  window.__PROD = produtos;
  let ped=null;
  if(id){ try{ ped = await api('/pedidos/'+id); }catch(e){ toast(e.message,'err'); return; } }
  PITENS = ped && ped.itens && ped.itens.length
    ? ped.itens.map(it=>({produtoId:it.produtoId, qtd:it.quantidade, val:Number(it.valorUnit), grade:it.grade||null}))
    : [{}];
  const ativas = (filiais||[]).filter(f=>f.ativa!==false);
  const selCli = ped?ped.clienteId:null;
  const selFil = ped?ped.filialId:null;
  const clientesOpts = clientes.map(c=>`<option value="${c.id}" ${selCli===c.id?'selected':''}>${esc(c.nome)}</option>`).join('');
  const filialOpts = ativas.map(f=>`<option value="${f.id}" ${selFil?(selFil===f.id?'selected':''):(f.matriz?'selected':'')}>${esc(f.nome)}${f.cnpj?' · '+esc(f.cnpj):''}</option>`).join('');
  openModal(`<h3>${id?'Editar pedido '+esc(ped.numero):'Novo pedido'}</h3>
    <div class="grid2">
      <div class="mrow"><label class="fl">Cliente *</label><select id="f_cli" class="inp">${clientesOpts||'<option>—</option>'}</select></div>
      <div class="mrow"><label class="fl">Empresa / CNPJ emissor</label><select id="f_filial" class="inp">${filialOpts||'<option value="">— matriz —</option>'}</select></div>
    </div>
    <label class="fl">Itens</label>
    <div id="pitens"></div>
    <button class="btn-sm" onclick="APP.addItem()" style="margin-top:8px">+ Adicionar item</button>
    <div class="grid2">${field('f_prazo','Prazo de entrega (opcional)','type="date"'+(ped&&ped.prazoEntrega?' value="'+String(ped.prazoEntrega).slice(0,10)+'"':''))}${field('f_pag','Forma de pagamento','placeholder="ex.: 50% sinal + 50% 28DDL"'+(ped&&ped.formaPagamento?' value="'+esc(ped.formaPagamento)+'"':''))}</div>
    ${field('f_oc','Ordem de compra do cliente (nº do PO/SAP)','placeholder="ex.: 4100676333"'+(ped&&ped.ordemCompraCliente?' value="'+esc(ped.ordemCompraCliente)+'"':''))}
    <div class="mactions"><button class="btn-sm" onclick="APP.closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="APP.savePedido(${id||''})">${id?'Salvar alterações':'Criar pedido'}</button></div>`);
  renderItens();
}
function prodLabel(p){ return p.codigo+' · '+p.descricao; }
function prodByLabel(list,v){ if(!v) return null; v=String(v).trim(); const code=(v.split('·')[0]||v).trim(); return (list||[]).find(x=>prodLabel(x)===v||x.codigo===code||x.descricao===v)||null; }
function prodDatalist(id,list){ return `<datalist id="${id}">${(list||[]).map(p=>`<option value="${esc(prodLabel(p))}"></option>`).join('')}</datalist>`; }
const TAMS_PADRAO=['PP','P','M','G','GG','G1','G2','G3'];
function parseGradeTxt(txt){ const o={}; let soma=0; for(const par of String(txt||'').split(/[,;]+/)){ const m=par.split(':'); const t=(m[0]||'').trim().toUpperCase(); const q=Math.round(Number((m[1]||'').trim())); if(t&&q>0){o[t]=q;soma+=q;} } return {o,soma}; }
function renderItens(){
  const prods = window.__PROD||[];
  $('pitens').innerHTML = prodDatalist('prodlist',prods) + PITENS.map((it,i)=>{
    const cur = it.produtoId ? prods.find(p=>p.id===it.produtoId) : null;
    const gradeTxt = it.grade ? Object.entries(it.grade).map(([t,q])=>t+':'+q).join(', ') : '';
    return `<div style="border:1px solid #efece3;border-radius:8px;padding:8px;margin-bottom:8px">
      <div class="grid2" style="align-items:end;margin-bottom:6px">
        <div><input class="inp" id="it_prod_${i}" list="prodlist" placeholder="digite p/ buscar produto…" value="${cur?esc(prodLabel(cur)):''}" onchange="APP.itemPreco(${i})"></div>
        <div style="display:flex;gap:6px"><input class="inp" id="it_val_${i}" type="number" step="0.01" placeholder="valor unit." value="${it.val||''}">
          ${PITENS.length>1?`<button class="btn-sm" onclick="APP.rmItem(${i})">×</button>`:''}</div>
      </div>
      <input class="inp" id="it_grade_${i}" placeholder="Grade por tamanho: PP:8, M:2, G:2 (ou deixe vazio e informe a qtd)" value="${esc(gradeTxt)}" oninput="APP.itemQty(${i})">
      <div style="margin-top:5px;display:flex;gap:4px;flex-wrap:wrap;align-items:center">
        ${TAMS_PADRAO.map(t=>`<button class="btn-sm" type="button" onclick="APP.itemAddTam(${i},'${t}')">+${t}</button>`).join('')}
        <span style="margin-left:auto;font-size:12px;color:#4a473f">Qtd total: <b id="it_qtdlbl_${i}">0</b></span>
        <input class="inp" id="it_qtd_${i}" type="number" min="1" placeholder="qtd s/ grade" value="${it.grade?'':(it.qtd||'')}" style="width:120px" oninput="APP.itemQty(${i})">
      </div>
    </div>`;
  }).join('');
  PITENS.forEach((it,i)=>itemQty(i));
}
function addItem(){ PITENS.push({}); renderItens(); }
function rmItem(i){ PITENS.splice(i,1); renderItens(); }
function itemQty(i){ const g=parseGradeTxt(val('it_grade_'+i)); const lbl=$('it_qtdlbl_'+i); if(!lbl)return; const manual=Number(val('it_qtd_'+i))||0; lbl.textContent = g.soma>0?g.soma:manual; }
function itemAddTam(i,t){ const el=$('it_grade_'+i); if(!el)return; if(new RegExp('(^|[,;\\s])'+t+'\\s*:','i').test(el.value)){toast(t+' já está na grade.','err');return;} el.value=el.value.trim()?(el.value.replace(/[,;\s]*$/,'')+', '+t+':'):(t+':'); el.focus(); itemQty(i); }
function itemPreco(i){ const p=prodByLabel(window.__PROD,val('it_prod_'+i)); if(p && p.precoBase && !$('it_val_'+i).value) $('it_val_'+i).value=p.precoBase; }
async function savePedido(id){
  const clienteId = Number(val('f_cli'));
  const itens = [];
  for(let i=0;i<PITENS.length;i++){
    const p=prodByLabel(window.__PROD,val('it_prod_'+i)), v=val('it_val_'+i);
    if(!p) continue;
    const g=parseGradeTxt(val('it_grade_'+i)); const manual=Number(val('it_qtd_'+i))||0;
    const quantidade = g.soma>0?g.soma:manual;
    if(!(quantidade>0)){ toast('Item '+(i+1)+': informe a grade ou a quantidade.','err'); return; }
    const item={ produtoId:p.id, quantidade, valorUnit:Number(v) };
    if(g.soma>0) item.grade=g.o;
    itens.push(item);
  }
  if(!clienteId){ toast('Selecione o cliente.','err'); return; }
  if(!itens.length){ toast('Adicione ao menos um item com produto.','err'); return; }
  const body = { clienteId, itens }; const pag=val('f_pag'); if(pag) body.formaPagamento=pag;
  const fil=val('f_filial'); if(fil) body.filialId=Number(fil);
  const prazo=val('f_prazo'); if(prazo) body.prazoEntrega=prazo;
  const oc=val('f_oc'); if(oc) body.ordemCompraCliente=oc;
  try{
    if(id){ const p=await api('/pedidos/'+id,{method:'PATCH',body}); closeModal(); toast('Pedido '+p.numero+' atualizado.','ok'); }
    else { const p=await api('/pedidos',{method:'POST',body}); closeModal(); toast('Pedido '+p.numero+' criado'+(p.exigePiloto?' (exige piloto)':'')+'.','ok'); }
    loadRoute();
  } catch(e){ toast(e.message,'err'); }
}

function bar(pct){ pct=Number(pct||0); return `<div style="display:flex;align-items:center;gap:8px"><div style="flex:1;height:7px;background:#eceae2;border-radius:6px;overflow:hidden;min-width:60px"><div style="height:100%;width:${pct}%;background:var(--gold)"></div></div><span style="font-size:11px;color:var(--muted)">${pct}%</span></div>`; }

async function etiquetaOp(id){
  const destino = prompt('Destino do fardo (facção/oficina/estamparia/bordado ou setor):','');
  if(destino===null) return;
  try{
    const r = await api('/ops/'+id+'/etiqueta'+(destino?('?destino='+encodeURIComponent(destino)):''));

    if(window.BrowserPrint && window.BrowserPrint.getDefaultDevice){

    } else {
      imprimirEtiqueta(r.dados, r.zpl);
    }
  }catch(e){ toast(e.message,'err'); }
}
function imprimirEtiqueta(d, zpl){
  const w = window.open('', '_blank', 'width=440,height=380');
  if(!w){ toast('Libere o pop-up para imprimir a etiqueta.','err'); return; }
  w.document.write(`<html><head><title>Etiqueta ${esc(d.op)}</title><style>
    @page{size:100mm 80mm;margin:0}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;color:#000}

    .h{font-weight:800;font-size:15pt} .r{font-size:11pt} .big{font-size:14pt;font-weight:800;margin-top:1mm}
    .op{margin-top:auto;text-align:center;font-family:'Courier New',monospace;font-weight:800;font-size:20pt;letter-spacing:2px;border:2px solid #000;padding:2mm}
    .bar{position:fixed;top:4px;right:4px}@media print{.bar{display:none}}
  </style></head><body>
    <div class="bar"><button onclick="window.print()">Imprimir</button> <button onclick="baixarZpl()">Baixar ZPL</button></div>
    <div class="lbl">
      <div class="h">GRUPO CHERKESIAN</div>
      <div class="r"><b>OP:</b> ${esc(d.op)} &nbsp; <b>PED:</b> ${esc(d.pedido)}</div>
      <div class="r"><b>Cliente:</b> ${esc(d.cliente)}</div>
      <div class="r"><b>Produto:</b> ${esc(d.produto)}</div>
      <div class="r"><b>Grade:</b> ${esc(d.grade)}</div>
      <div class="r"><b>Qtd:</b> ${d.quantidade} &nbsp; <b>Cor:</b> ${esc(d.cor)}</div>
      <div class="big">DESTINO: ${esc(d.destino)}</div>
      <div class="op">${esc(d.op)}</div>
    </div>
    <script>var ZPL=${JSON.stringify(zpl)};function baixarZpl(){var b=new Blob([ZPL],{type:'text/plain'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='etiqueta-${esc(d.op)}.zpl';a.click();}<\/script>
  </body></html>`);
  w.document.close();
  setTimeout(()=>{ try{ w.focus(); w.print(); }catch(e){} }, 400);
}
function formOp(o){
  const opts = OP_STATUS.map(s=>`<option value="${s}" ${s===o.status?'selected':''}>${s.replace(/_/g,' ')}</option>`).join('');
  const gradeAtual = o.gradeTamanhos ? Object.entries(o.gradeTamanhos).map(([t,q])=>t+':'+q).join(', ') : '';
  openModal(`<h3>Atualizar OP ${esc(o.numero)}</h3>
    <div class="mrow"><label class="fl">Status</label><select id="f_st" class="inp">${opts}</select></div>
    <div class="grid2">${field('f_setor','Setor atual','value="'+esc(o.setorAtual||'')+'"')}${field('f_resp','Responsável','value="'+esc(o.responsavel||'')+'"')}</div>
    ${field('f_prog','Progresso (%)','type="number" min="0" max="100" value="'+(o.progresso||0)+'"')}

async function saveOp(id){
  try{
    await api('/ops/'+id+'/status',{method:'PATCH',body:{status:val('f_st'), setorAtual:val('f_setor')||undefined, responsavel:val('f_resp')||undefined}});
    await api('/ops/'+id+'/progresso',{method:'PATCH',body:{progresso:Number(val('f_prog')||0)}});
    const gradeTxt = val('f_gradeop');
    const grade = {};
    if(gradeTxt){
      for(const par of gradeTxt.split(/[,;]+/)){
        const [t,q] = par.split(':').map(s=>s.trim());
        if(t && q) grade[t.toUpperCase()] = Number(q);
      }
    }
    await api('/ops/'+id+'/grade',{method:'PATCH',body:{grade}});
    closeModal(); toast('OP atualizada.','ok'); loadRoute();
  }catch(e){ toast(e.message,'err'); }
}

async function formNotaEntrada(prefill){
  if(!prefill) window.__NEPRE=null;
  const [forn, mats] = await Promise.all([api('/fornecedores'), api('/materiais')]);
  window.__MATS = mats;
  const p = prefill||{};
  const fo = ['<option value="">— selecione —</option>'].concat(forn.map(f=>`<option value="${f.id}">${esc(f.nome)}</option>`)).join('');
  NEITENS = (p.itens&&p.itens.length)?p.itens.map(x=>Object.assign({},x)):[{unidade:'un'}];
  openModal(`<h3>Nova nota de entrada</h3>
    ${p.nomeEmitente?`<div class="muted" style="font-size:12px;margin:-6px 0 8px">Emitente (SEFAZ): <b>${esc(p.nomeEmitente)}</b>${p.cnpjEmitente?' · CNPJ '+esc(p.cnpjEmitente):''}</div>`:''}
    <div class="grid2">
      <div class="mrow"><label class="fl">Fornecedor</label><select id="ne_forn" class="inp">${fo}</select></div>
      ${field('ne_num','Número da NF *','value="'+esc(p.numero||'')+'"')}
    </div>
    <div class="grid3">${field('ne_serie','Série','value="'+esc(p.serie||'')+'"')}${field('ne_data','Emissão','type="date"'+(p.data?(' value="'+esc(p.data)+'"'):''))}${field('ne_chave','Chave (44 díg.)','value="'+esc(p.chave||'')+'"')}</div>
    <label class="fl" style="margin-top:6px">Itens</label>
    <div id="neitens"></div>
    <button class="btn-sm" onclick="APP.neAdd()" style="margin-top:6px">+ item</button>
    <div style="border-top:1px solid var(--line);margin:12px 0 8px;padding-top:8px">
      <label class="fl"><input type="checkbox" id="ne_est" checked> Dar entrada no estoque <span class="muted">(soma ao saldo do material vinculado)</span></label>
      <label class="fl" style="margin-top:8px"><input type="checkbox" id="ne_cp" checked onchange="APP.neCpToggle()"> Gerar conta a pagar</label>
    </div>
    <div class="grid2" id="ne_cpbox">${field('ne_venc','Vencimento','type="date"')}${field('ne_cat','Categoria','value="Matéria-prima"')}</div>
    <div class="mactions"><button class="btn-sm" onclick="APP.closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="APP.saveNotaEntrada()">Salvar entrada</button></div>`);
  if(p.fornecedorId){ const s=$('ne_forn'); if(s) s.value=p.fornecedorId; }
  neRender();
}
function neRender(){
  const box=$('neitens'); if(!box) return;
  const mats=window.__MATS||[];
  const mo = ['<option value="">— vincular material —</option>'].concat(mats.map(m=>`<option value="${m.id}" data-un="${esc(m.unidade)}" data-desc="${esc(m.descricao)}">${esc(m.codigo)} · ${esc(m.descricao)}</option>`)).join('');
  box.innerHTML = NEITENS.map((it,i)=>`
    <div class="grid2" style="margin-bottom:6px">
      <select class="inp" id="ne_mat_${i}" onchange="APP.neMat(${i})">${mo}</select>
      <input class="inp" id="ne_desc_${i}" placeholder="descrição *" value="${esc(it.descricao||'')}">
    </div>
    <div class="grid3" style="margin-bottom:12px">
      <input class="inp" id="ne_qtd_${i}" type="number" step="0.001" placeholder="qtd" value="${it.quantidade!=null?it.quantidade:''}">
      <input class="inp" id="ne_un_${i}" placeholder="un" value="${esc(it.unidade||'un')}">
      <div style="display:flex;gap:6px"><input class="inp" id="ne_vu_${i}" type="number" step="0.0001" placeholder="valor unit." value="${it.valorUnit!=null?it.valorUnit:''}">${NEITENS.length>1?`<button class="btn-sm" onclick="APP.neDel(${i})">×</button>`:''}</div>
    </div>`).join('');
  NEITENS.forEach((it,i)=>{ if(it.materialId){ const s=$('ne_mat_'+i); if(s) s.value=it.materialId; } });
}
function neSync(){ NEITENS.forEach((it,i)=>{ const d=$('ne_desc_'+i); if(!d) return; it.descricao=d.value; it.quantidade=val('ne_qtd_'+i); it.unidade=val('ne_un_'+i)||'un'; it.valorUnit=val('ne_vu_'+i); const m=$('ne_mat_'+i); it.materialId=(m&&m.value)?Number(m.value):undefined; }); }
function neAdd(){ neSync(); NEITENS.push({unidade:'un'}); neRender(); }
function neDel(i){ neSync(); NEITENS.splice(i,1); neRender(); }
function neMat(i){ const o=$('ne_mat_'+i).selectedOptions[0]; if(o&&o.value){ if(!$('ne_desc_'+i).value)$('ne_desc_'+i).value=o.getAttribute('data-desc')||''; $('ne_un_'+i).value=o.getAttribute('data-un')||'un'; } }
function neCpToggle(){ $('ne_cpbox').style.display=$('ne_cp').checked?'':'none'; }
async function saveNotaEntrada(){
  neSync();
  const itens = NEITENS.filter(it=>it.descricao&&it.descricao.trim()&&Number(it.quantidade)>0&&it.valorUnit!==''&&it.valorUnit!=null)
    .map(it=>{ const o={ descricao:it.descricao.trim(), quantidade:Number(it.quantidade), unidade:it.unidade||'un', valorUnit:Number(it.valorUnit) }; if(it.materialId) o.materialId=it.materialId; return o; });
  if(!val('ne_num')){ toast('Informe o número da NF.','err'); return; }
  if(!itens.length){ toast('Adicione ao menos um item (descrição, quantidade e valor).','err'); return; }
  const body = { numero:val('ne_num'), itens };
  const fid=val('ne_forn'); if(fid) body.fornecedorId=Number(fid);
  const serie=val('ne_serie'); if(serie) body.serie=serie;
  const chave=(val('ne_chave')||'').replace(/\D/g,''); if(chave) body.chave=chave;
  const data=val('ne_data'); if(data) body.emitidaEm=data;
  body.lancarEstoque = $('ne_est').checked;
  body.gerarContaPagar = $('ne_cp').checked;
  if(body.gerarContaPagar){ const v=val('ne_venc'); if(v) body.vencimento=v; const cat=val('ne_cat'); if(cat) body.categoria=cat; }
  const pre=window.__NEPRE; if(pre){ if(pre.cnpjEmitente) body.cnpjEmitente=pre.cnpjEmitente; if(pre.nomeEmitente) body.nomeEmitente=pre.nomeEmitente; }
  try{
    const n=await api('/notas-entrada',{method:'POST',body}); closeModal(); window.__NEPRE=null;
    let msg='Entrada registrada (NF '+n.numero+').';
    if(n.materiaisAtualizados&&n.materiaisAtualizados.length) msg+=' Estoque: '+n.materiaisAtualizados.join(', ')+'.';
    if(n.contaPagarGerada) msg+=' Conta a pagar gerada.';
    toast(msg,'ok'); loadRoute();
  }catch(e){ toast(e.message,'err'); }
}

  toast('Consultando a SEFAZ…','ok');

    <div class="mactions"><button class="btn-sm" onclick="APP.closeModal()">Fechar</button></div>`);

async function importarSefaz(i){
  const n=(window.__SEFAZ||[])[i]; if(!n) return;
  const forn = await api('/fornecedores').catch(()=>[]);
  const match = forn.find(f=>(f.cnpjCpf||'').replace(/\D/g,'')===(n.cnpjEmitente||''));

  });
}

async function loadCusto(){
  const id = val('pr_prod'); const out = $('pr_out');
  if(!id){ out.innerHTML = '<div class="empty">Selecione um produto.</div>'; return; }
  out.innerHTML = '<div class="spin"></div>';
  try{
    const d = await api('/produtos/'+id+'/custo');
    window.__CUSTO = Number(d.custoMaterial);
    out.innerHTML = `
      <div class="sect" style="margin-top:0"><h3>Consumo (BOM) · ${esc(d.produto.codigo)}</h3>` +
      (d.itens.length ? panelTable(['Material','Descrição','Qtd','Custo unit.','Subtotal'],
        d.itens.map(i=>[`<span class="mono gold">${esc(i.material)}</span>`, esc(i.descricao), esc(i.quantidade)+' '+esc(i.unidade), money(i.custoUnit), `<b>${money(i.subtotal)}</b>`]))
        : '<div class="panel"><div class="empty">Este produto ainda não tem receita (BOM) cadastrada.</div></div>') + `</div>
      <div class="sect"><h3>Composição do preço</h3>
        <div class="panel" style="padding:18px">
          <div class="grid3">
            <div><label class="fl">Custo de material (BOM)</label><input class="inp" value="${money(d.custoMaterial)}" disabled></div>
            ${field('pr_mo','Mão de obra + facção (R$)','type="number" step="0.01" value="0" oninput="APP.calcPreco()"')}
            ${field('pr_outros','Outros custos (R$)','type="number" step="0.01" value="0" oninput="APP.calcPreco()"')}
          </div>
          <div class="grid2" style="margin-top:4px">
            ${field('pr_imp','Impostos sobre venda (%)','type="number" step="0.01" value="5.93" oninput="APP.calcPreco()"')}
            ${field('pr_marg','Margem desejada (%)','type="number" step="0.5" value="40" oninput="APP.calcPreco()"')}
          </div>
          <div id="pr_res" style="margin-top:10px"></div>
        </div>
      </div>`;
    calcPreco();
  }catch(e){ out.innerHTML = `<div class="empty" style="color:#c14a34">${esc(e.message)}</div>`; }
}
function calcPreco(){
  const custo = (window.__CUSTO||0) + Number(val('pr_mo')||0) + Number(val('pr_outros')||0);
  const imp = Number(val('pr_imp')||0), marg = Number(val('pr_marg')||0);
  const divisor = 1 - (imp+marg)/100;
  const el = $('pr_res'); if(!el) return;
  if(divisor <= 0){ el.innerHTML = '<div class="err">Impostos + margem não podem somar 100% ou mais.</div>'; return; }
  const preco = custo/divisor, lucro = preco*marg/100;
  el.innerHTML = `<div class="cards">
    ${kpi('Custo total da peça', money(custo), 'material + mão de obra + outros')}
    ${kpi('Preço de venda sugerido', money(preco), 'markup divisor: 1 − (imp% + margem%)')}
    ${kpi('Lucro estimado / peça', money(lucro), marg+'% sobre o preço')}
  </div>`;
}

async function gerarDoc(tipo, refId){
  try{
    const d = await api('/documentos/'+tipo, {method:'POST', body:{referenciaId:refId}});
    const r = await fetch(d.urlPdf, { headers: { Authorization:'Bearer '+S.access } });
    if(!r.ok) throw new Error('Falha ao baixar o PDF ('+r.status+').');

    window.open(URL.createObjectURL(blob), '_blank');
    toast('Documento '+d.numero+' gerado.','ok');
  }catch(e){ toast(e.message,'err'); }
}

async function sendEmailDoc(tipo, refId){
  const para = val('f_para'); const mensagem = val('f_msg');
  if(!para){ toast('Informe o e-mail de destino.','err'); return; }
  try{
    const d = await api('/documentos/'+tipo,{method:'POST',body:{referenciaId:refId}});
    const body = { para }; if(mensagem) body.mensagem = mensagem;
    const r = await api('/documentos/'+d.id+'/enviar-email',{method:'POST',body});

async function baixarNfeArquivo(id,tipo){
  try{
    const r = await fetch(API+'/nfe/'+id+'/'+tipo, { headers:{ Authorization:'Bearer '+S.access } });
    if(!r.ok){ let m='Falha ao baixar '+(tipo==='danfe'?'DANFE':'XML')+' ('+r.status+').'; try{const j=await r.json();m=j.message||m;}catch(e){} throw new Error(m); }
    const blob = await r.blob(); const url = URL.createObjectURL(blob);
    if(tipo==='danfe'){ window.open(url,'_blank'); }
    else { const a=document.createElement('a'); const cd=r.headers.get('Content-Disposition')||''; const mt=cd.match(/filename="([^"]+)"/); a.href=url; a.download=mt?mt[1]:('NFe-'+id+'.xml'); document.body.appendChild(a); a.click(); a.remove(); }

  }catch(e){ toast(e.message,'err'); }
}

  AG.busy=true; renderAgMsgs();
  try{
    const r = await api('/agente/executar', { method:'POST', body:{ tipo:a.tipo, dados:a.dados } });
    a.estado = r && r.ok ? 'feito' : 'erro';
    a.resultado = (r && r.resumo) || '';
    if(a.estado==='feito') toast(a.resultado,'ok');
  }catch(e){
    a.estado='erro'; a.resultado = e.message || 'Falha ao executar.';
    toast(a.resultado,'err');
  }finally{ AG.busy=false; renderAgMsgs(); }
}
function agenteCancel(i){
  const a = AG.hist[i]; if(!a || a.estado!=='pendente') return;
  a.estado='cancelado'; renderAgMsgs();
}

    S.route = (allowed==='*'||allowed.includes('dashboard'))?'dashboard':firstReady(allowed);

function gradeAddTam(t){
  const el=$('f_gradeop'); if(!el) return;
  const cur=el.value.trim();
  if(new RegExp('(^|[,;\\s])'+t+'\\s*:','i').test(cur)){ toast(t+' já está na grade.','err'); return; }
  el.value = cur ? (cur.replace(/[,;\s]*$/,'')+', '+t+':') : (t+':');
  el.focus();
}

    const t=prompt('Transportador (opcional):',''); if(t) body.transportador=t;
  }
  if(acao==='retornar'){
    const nf=prompt('Nº da NF de RETORNO da facção (obrigatório p/ dar entrada):','');
    if(nf===null) return;
    if(!nf.trim()){ toast('Informe a NF de retorno da facção — o kit fica travado até isso.','err'); return; }
    body.retornoNf=nf.trim();
    const q=prompt('Quantidade retornada (deixe em branco = total):',''); if(q!==null && q!=='') body.qtd=Number(q);
  }
  try{ const r=await api('/kits/'+acao,{method:'POST',body});
    toast((r.ja?'⚠️ ':'✅ ')+r.mensagem, r.ja?'err':'ok');
    $('kit_bip').value=''; loadRoute();
  }catch(e){ toast('Falha: '+(e.message||e),'err'); }
}

async function saveKitLote(){

async function formKitsDaOp(){
  const [ops, lotes] = await Promise.all([api('/ops'), api('/kits/lotes')]);
  const comGrade = (ops||[]).filter(o=>o.gradeTamanhos && Object.keys(o.gradeTamanhos).length);
  if(!comGrade.length){ toast('Nenhuma OP com grade de tamanhos. Defina a grade na OP primeiro.','err'); return; }
  if(!lotes.length){ toast('Cadastre um lote de tecido antes (+ Lote de tecido).','err'); return; }
  const oo=comGrade.map(o=>`<option value="${o.id}">${esc(o.numero)} · ${esc(o.pedido?o.pedido.numero:'')} · ${Object.entries(o.gradeTamanhos).map(([t,q])=>t+':'+q).join(' ')}</option>`).join('');
  const lo=lotes.map(l=>`<option value="${l.id}">${esc(l.codigoLote)}${l.nfCompra?' · NF '+esc(l.nfCompra):''}${l.corTecido?' · '+esc(l.corTecido):''}</option>`).join('');
  openModal(`<h3>Gerar kits da OP (um por tamanho)</h3>
    <div class="muted" style="font-size:12px;margin:-6px 0 8px">Cada tamanho da grade vira um kit com a quantidade cortada, ligado ao lote do tecido.</div>
    <div class="mrow"><label class="fl">Ordem de Produção *</label><select id="kg_op" class="inp">${oo}</select></div>
    <div class="mrow"><label class="fl">Lote do tecido (enfesto) *</label><select id="kg_lote" class="inp">${lo}</select></div>
    <div class="grid2">${field('kg_fac','Facção destino','placeholder="ex.: Facção Alfa"')}${field('kg_ppj','Peças por jogo','type="number" min="1" value="1"')}</div>
    <div class="grid3">${field('kg_enf','Enfesto','placeholder="EF-000184"')}${field('kg_oc','Ordem de corte','placeholder="OC-000241"')}${field('kg_mesa','Mesa de corte','')}</div>
    <div class="grid2">${field('kg_op2','Operador do corte','')}${field('kg_cor','Cor (se não vier do pedido)','')}</div>
    ${field('kg_caixa','Caixa de armazenamento','placeholder="ex.: CX-01"')}
    <div class="mactions"><button class="btn-sm" onclick="APP.closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="APP.saveKitsDaOp()">Gerar kits</button></div>`);
}
async function saveKitsDaOp(){
  const body={ opId:Number(val('kg_op')), loteTecidoId:Number(val('kg_lote')),
    faccaoNome:val('kg_fac')||undefined, enfesto:val('kg_enf')||undefined, ordemCorte:val('kg_oc')||undefined,
    mesaCorte:val('kg_mesa')||undefined, operadorCorte:val('kg_op2')||undefined, cor:val('kg_cor')||undefined, caixa:val('kg_caixa')||undefined };
  const ppj=Number(val('kg_ppj')); if(ppj>0) body.pecasPorJogo=ppj;
  if(!body.opId||!body.loteTecidoId){ toast('Selecione a OP e o lote.','err'); return; }
  try{ const r=await api('/kits/gerar-da-op',{method:'POST',body}); closeModal();
    toast(r.total+' kit(s) gerados da OP '+r.op+' (lote '+r.lote+').','ok');
    if(confirm(r.total+' kits criados. Imprimir todas as etiquetas agora?')){ for(const k of r.kits){ await APP.kitEtiqueta(k.id, true); } }
    loadRoute();
  }catch(e){ toast(e.message,'err'); }
}
async function kitEtiqueta(id, silencioso){
  try{
    const r=await api('/kits/'+id+'/etiqueta');
    if(window.BrowserPrint && window.BrowserPrint.getDefaultDevice){
      window.BrowserPrint.getDefaultDevice('printer', dev=>dev.send(r.zpl, ()=>{}, ()=>imprimirEtiquetaKit(r.dados,r.zpl,silencioso)), ()=>imprimirEtiquetaKit(r.dados,r.zpl,silencioso));
    } else { imprimirEtiquetaKit(r.dados, r.zpl, silencioso); }
  }catch(e){ toast(e.message,'err'); }
}
function imprimirEtiquetaKit(d, zpl, silencioso){
  const w=window.open('','_blank','width=440,height=380'); if(!w){ toast('Libere o pop-up para imprimir.','err'); return; }
  w.document.write(`<html><head><title>${esc(d.codigo)}</title><style>
    @page{size:100mm 70mm;margin:0} body{margin:0;font-family:Arial,sans-serif;color:#000}
    .lbl{width:100mm;height:70mm;box-sizing:border-box;padding:4mm;display:flex;flex-direction:column;gap:1.2mm}
    .h{font-weight:800;font-size:12pt} .cod{font-size:17pt;font-weight:800;font-family:'Courier New',monospace}
    .r{font-size:10pt} .tam{font-size:15pt;font-weight:800;border:2px solid #000;padding:1.5mm;text-align:center}
    .bar{position:fixed;top:4px;right:4px}@media print{.bar{display:none}}
  </style></head><body>
    <div class="bar"><button onclick="window.print()">Imprimir</button> <button onclick="zpl()">Baixar ZPL</button></div>
    <div class="lbl">
      <div class="h">GRUPO CHERKESIAN — KIT</div>
      <div class="cod">${esc(d.codigo)}</div>
      <div class="r"><b>Pedido:</b> ${esc(d.pedido)} &nbsp; <b>Cliente:</b> ${esc(d.cliente)}</div>
      <div class="r"><b>Modelo:</b> ${esc(d.modelo)} &nbsp; <b>Cor:</b> ${esc(d.cor)}</div>
      <div class="tam">TAM ${esc(d.tamanho)} · ${d.jogos} JOGOS / ${d.pecas} PEÇAS</div>
      <div class="r"><b>Lote:</b> ${esc(d.lote)} &nbsp; <b>Enfesto:</b> ${esc(d.enfesto)} &nbsp; <b>OC:</b> ${esc(d.oc)}</div>
      <div class="r"><b>DESTINO:</b> ${esc(d.destino)}</div>
    </div>
    <script>var Z=${JSON.stringify(zpl)};function zpl(){var b=new Blob([Z],{type:'text/plain'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='${esc(d.codigo)}.zpl';a.click();}<\/script>
  </body></html>`);
  w.document.close();
  if(!silencioso) setTimeout(()=>{ try{w.focus();w.print();}catch(e){} }, 400);
}
async function kitCaixas(){
  try{ const cx=await api('/kits/por-caixa');
    if(!cx.length){ toast('Nenhum kit em caixa. A caixa é definida ao gerar os kits da OP.','err'); return; }
    const blocos=cx.map(c=>`<div style="border:1px solid #e7e3d8;border-radius:10px;padding:10px 12px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between"><b>📦 Caixa ${esc(c.caixa)}</b><span class="muted">${c.totalKits} kit(s) · ${c.pecas} peças</span></div>
      <div class="muted" style="font-size:12px">Pedido ${esc(c.pedidoId||'—')} · ${esc(c.cliente||'—')} · Tamanhos: ${esc(c.tamanhos)}</div>
      <div style="font-size:11px;margin-top:4px">${c.kits.map(k=>`<span class="mono" style="margin-right:8px">${esc(k.codigo)}(${esc(k.tamanho)})</span>`).join('')}</div>
    </div>`).join('');
    openModal(`<h3>📦 Caixas · ${cx.length}</h3><div style="max-height:60vh;overflow:auto">${blocos}</div>
      <div class="mactions"><button class="btn-sm" onclick="APP.closeModal()">Fechar</button></div>`);
  }catch(e){ toast(e.message,'err'); }
}
async function kitBuscar(){
  const q=prompt('Buscar kit por: código, pedido, cliente, modelo, cor, tamanho, facção, lote, enfesto, OC...','');
  if(q===null||!q.trim()) return;
  try{ const r=await api('/kits/buscar?q='+encodeURIComponent(q.trim()));
    if(!r.length){ toast('Nenhum kit encontrado para "'+q+'".','err'); return; }
    openModal(`<h3>🔍 ${r.length} kit(s) — "${esc(q)}"</h3>
      <div style="max-height:60vh;overflow:auto">${panelTable(['Código','Tam','Modelo','Lote','Status'], r.map(k=>[
        `<span class="mono gold">${esc(k.codigo)}</span>`, esc(k.tamanho), esc(k.modelo||'—'), esc(k.lote?k.lote.codigoLote:'—'), kitPill(k.status)]))}</div>
      <div class="mactions"><button class="btn-sm" onclick="APP.closeModal()">Fechar</button></div>`);
  }catch(e){ toast(e.message,'err'); }
}
async function kitDetalhe(id){
  try{ const k=await api('/kits/'+id);
    const ev=(k.eventos||[]).map(e=>`<tr><td>${new Date(e.criadoEm).toLocaleString('pt-BR')}</td><td><b>${esc(e.evento)}</b></td><td>${esc(e.detalhe||'')}</td><td>${esc(e.usuario||'')}</td></tr>`).join('');
    openModal(`<h3>Kit ${esc(k.codigo)} · ${kitPill(k.status)}</h3>
      <div class="muted" style="font-size:12px;margin-bottom:8px">${esc(k.modelo||'')} · Tam ${esc(k.tamanho)} · ${k.jogos} jogos/${k.pecasTotal} peças · Lote ${esc(k.lote?k.lote.codigoLote:'—')} · NF tecido ${esc(k.lote&&k.lote.nfCompra?k.lote.nfCompra:'—')}</div>
      <label class="fl">Histórico / auditoria</label>
      <div style="max-height:50vh;overflow:auto"><table style="width:100%;font-size:12px"><thead><tr><th>Quando</th><th>Evento</th><th>Detalhe</th><th>Usuário</th></tr></thead><tbody>${ev||'<tr><td colspan=4 class="muted">Sem eventos.</td></tr>'}</tbody></table></div>
      <div class="mactions"><button class="btn-sm" onclick="APP.closeModal()">Fechar</button>
        <button class="btn-sm" onclick="APP.kitEtiqueta(${k.id})">🏷 Reimprimir etiqueta</button></div>`);
  }catch(e){ toast(e.message,'err'); }
}
