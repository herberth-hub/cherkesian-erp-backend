# Render Blueprint — Cherkesian ERP Backend
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: cherkesian-erp-backend
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm install && npm run build
    # migrate deploy aplica as migrations no Neon antes de subir a API
    startCommand: npm run start:migrate
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Segredos e URLs do banco: preencha no painel do Render (sync:false = não versionado)
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: TIMEZONE
        value: America/Sao_Paulo
      # Opcional: restrinja o CORS ao domínio do frontend em produção
      # - key: CORS_ORIGIN
      #   value: https://seu-frontend.com
